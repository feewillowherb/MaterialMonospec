# 推理标注分类表
# 订阅的分类将在 OpenSpec 提案生成时被标注
#
# 文档: reasoning-categories.yaml
# 项目: MaterialMonospec (MaterialClient + UrbanManagement)
# 维护者: 用户和 AI agent 共同维护
# 规范: skill-vault/docs/2026-06-11-reasoning-annotate-skill/02-分类表规范.md

domains:
  技术:

    # --- high priority ---

    arch-decision:
      name: 架构决策
      description: 涉及系统架构选择和权衡的推理，包括 Monospec 主仓库与子仓库的协作模式决策
      priority: high
      subscribed: true

    security:
      name: 安全考量
      description: 安全相关的设计推理，包括认证、令牌刷新、权限控制
      priority: high
      subscribed: true

    data-sync:
      name: 数据同步
      description: 涉及客户端与服务端数据同步策略的推理，包括离线/在线切换、冲突处理、缓存一致性
      priority: high
      subscribed: true

    integration:
      name: 集成风险
      description: 外部依赖和集成点相关推理，包括称重硬件SDK、LPR识别、摄像头、Gate IO设备集成
      priority: high
      subscribed: true

    # --- medium priority ---

    perf-impact:
      name: 性能影响
      description: 影响性能的设计选择推理，包括称重数据实时性、图片压缩、分页查询效率
      priority: medium
      subscribed: true

    data-model:
      name: 数据模型
      description: 数据结构设计相关推理，包括实体迁移、关系映射、DTO 设计
      priority: medium
      subscribed: true

    ui-migration:
      name: UI 迁移
      description: 涉及前端视图迁移和布局设计的推理，包括 Avalonia 控件映射、Layui 组件迁移
      priority: medium
      subscribed: true

    test-strategy:
      name: 测试策略
      description: 涉及测试基础设施和验证方案的推理，包括测试注入、模拟数据、集成测试
      priority: medium
      subscribed: true

    # --- low priority ---

    migration:
      name: 迁移策略
      description: 数据或系统迁移相关推理，包括数据库迁移脚本、配置迁移
      priority: low
      subscribed: true

    monitoring:
      name: 可观测性
      description: 日志、监控、告警相关推理，包括设备状态监控、操作日志
      priority: low
      subscribed: false

  业务:

    biz-rule:
      name: 业务规则
      description: 涉及业务流程、领域逻辑的推理，包括称重流程、过磅规则、订单管理、废品分类
      priority: high
      subscribed: true

    weighing-logic:
      name: 称重逻辑
      description: 涉及称重模式（ attended/unattended ）、毛重皮重计算、扣重规则的推理
      priority: high
      subscribed: true

    gate-control:
      name: 门禁管控
      description: 涉及道闸控制、进出方向、会话管理、车牌匹配的推理
      priority: medium
      subscribed: true

    lpr-recognition:
      name: 车牌识别
      description: 涉及车牌识别流程、匹配阈值、锁定策略、缓存同步的推理
      priority: medium
      subscribed: true

  通用:

    scope-decision:
      name: 范围决策
      description: 关于功能范围边界的推理，包括主仓库与子仓库职责划分
      priority: medium
      subscribed: true

    cross-repo:
      name: 跨仓库协调
      description: 涉及 Monospec 主仓库与子仓库（MaterialClient/UrbanManagement）之间变更协调的推理
      priority: medium
      subscribed: true
